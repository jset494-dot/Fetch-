<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Poké-Random</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; width: 250px; }
        img { width: 150px; height: 150px; background: #f9f9f9; border-radius: 50%; }
        button { margin-top: 15px; padding: 10px; cursor: pointer; background: #ef5350; color: white; border: none; border-radius: 5px; width: 100%; }
        h2 { text-transform: capitalize; margin: 10px 0; }
        .type { background: #eee; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="card">
        <img id="poke-img" src="" alt="Cargando...">
        <h2 id="poke-name">Cargando...</h2>
        <div id="poke-types"></div>
        <button onclick="getRandomPokemon()">¡Siguiente Pokémon!</button>
    </div>

    <script>
        async function getRandomPokemon() {
            // 1. Generar número aleatorio
            const id = Math.floor(Math.random() * 1025) + 1;
            
            try {
                // 2. Llamada a la API
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                const data = await response.json();

                // 3. Inyectar datos en el HTML
                document.getElementById('poke-name').innerText = data.name;
                document.getElementById('poke-img').src = data.sprites.front_default;
                
                // Limpiar y poner tipos
                const typesContainer = document.getElementById('poke-types');
                typesContainer.innerHTML = ''; 
                data.types.forEach(t => {
                    const span = document.createElement('span');
                    span.className = 'type';
                    span.innerText = t.type.name + ' ';
                    typesContainer.appendChild(span);
                });

            } catch (error) {
                console.error("Error al traer al Pokémon", error);
            }
        }

        // Cargar uno al abrir la página
        getRandomPokemon();
    </script>
</body>
</html>
